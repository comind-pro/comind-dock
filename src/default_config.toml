# comind-dock default configuration.
# Location: $XDG_CONFIG_HOME/comind-dock/config.toml (or CDOCK_CONFIG_PATH,
# or `cdock --config <path>`).
# Every key is optional; omitted keys use the defaults shown here.

[theme]
name = "default"      # "default" | "terminal" (follow the host palette)

# Per-token overrides. Colors: "#rrggbb", "rgb(r,g,b)", named ("cyan"), "reset".
# [theme.custom]
# accent = "#00ffff"
# divider = "darkgray"
# tab_bar_bg = "#14141e"
# muted = "gray"

[terminal]
default_shell = ""    # empty → $SHELL → /bin/sh
shell_mode = "auto"   # auto | login | non_login (auto: login shell on macOS)
new_cwd = "follow"    # follow | home | current | /absolute/path
                      # follow = wherever the focused pane's process sits
editor = ""           # settings/profiles editor (empty → $EDITOR → nano)

[keys]
prefix = "ctrl+b"
# Override any action. Bare key = pressed after the prefix; a chord with
# modifiers (e.g. "ctrl+alt+t") binds directly, without the prefix.
# Multiple keys: next_tab = ["n", "tab"].
# Actions: split_right, split_down, focus_left/down/up/right,
# swap_left/down/up/right, resize_mode, zoom, close_pane, new_tab, next_tab,
# prev_tab, rename_tab, close_tab, new_workspace, rename_workspace,
# close_workspace, next_workspace, toggle_sidebar, help, quit.
# prefix+1..9 always jumps to tab 1..9.

# Custom bindings. type = "pane" runs in a new tab; "shell" runs silently.
# [[keys.command]]
# key = "g"
# type = "pane"
# command = "lazygit"
# description = "open lazygit"

[ui]
sidebar_width = 24
mouse_capture = true
mouse_scroll_lines = 3
confirm_close = false
prompt_new_tab_name = false
hide_tab_bar_when_single_tab = false

# Agent notifications: blocked (needs your input) and finished.
[ui.sound]
enabled = true        # terminal bell + system sound; CDOCK_DISABLE_SOUND kills all

[ui.toast]
delivery = "both"     # app | system | both | off; app toasts click-to-jump

[worktrees]
directory = "~/.comind-dock/worktrees"   # <dir>/<repo>/<branch-slug>

[update]
check = true                              # background release check (6h)
repo = "comind-pro/comind-dock"           # GitHub update feed
channel = "stable"                        # stable | preview (prereleases too)

[advanced]
scrollback_limit_bytes = 10000000   # converted to lines at ~120 bytes/line

[experimental]
allow_nested = false                # allow cdock inside a cdock pane
