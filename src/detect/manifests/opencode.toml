# opencode detection rules.
id = "opencode"

[[rule]]
priority = 100
state = "blocked"
# No bare "approve": the model's own prose ("once you approve, I'll…")
# lingers in the transcript and would re-block an idle agent.
any_of = ["permission required", "allow once", "always allow"]
none_of = ["esc to interrupt", "esc interrupt"]

[[rule]]
priority = 90
state = "working"
any_of = ["esc interrupt", "esc to interrupt", "working..."]

[[rule]]
priority = 50
state = "idle"
any_of = ["ctrl+? help", "/ for commands", "tab switch agent"]
