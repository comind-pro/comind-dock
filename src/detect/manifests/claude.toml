# Claude Code detection rules. Bottom-of-buffer text, case-insensitive.
# The input box ("❯", mode hints) is ALWAYS on screen, even mid-task — idle
# markers alone prove nothing; the spinner line is the real working signal.
# Spinner verbs are random ("Churning…", "Dilly-dallying…"); the stable part
# is the parenthetical: elapsed time and the ↑/↓ token counter.
id = "claude"

# Permission / approval dialogs — must win over the working spinner.
# Prose like "do you want to" lingers in the transcript after approval and
# would re-block an idle agent; it only counts alongside a LIVE dialog
# cursor ("❯ 1"). Unambiguous markers keep their own rule below.
# One rule per cursor position — the user arrowing to option 2 or 3 must
# not flip the status out of Blocked mid-dialog.
[[rule]]
priority = 100
state = "blocked"
all_of = ["❯ 1. "]
any_of = [
    "do you want to proceed",
    "do you want to",
    "would you like to",
    "yes, and don't ask again",
]
none_of = ["esc to interrupt", "running stop hooks", "· ↓ ", "· ↑ "]

[[rule]]
priority = 100
state = "blocked"
all_of = ["❯ 2. "]
any_of = ["do you want to proceed", "do you want to", "would you like to", "yes, and don't ask again"]
none_of = ["esc to interrupt", "running stop hooks", "· ↓ ", "· ↑ "]

[[rule]]
priority = 100
state = "blocked"
all_of = ["❯ 3. "]
any_of = ["do you want to proceed", "do you want to", "would you like to", "yes, and don't ask again"]
none_of = ["esc to interrupt", "running stop hooks", "· ↓ ", "· ↑ "]

[[rule]]
priority = 95
state = "blocked"
any_of = ["waiting for your approval", "grant access", "esc to cancel"]
none_of = ["esc to interrupt", "running stop hooks", "· ↓ ", "· ↑ "]

[[rule]]
priority = 90
state = "working"
any_of = [
    "esc to interrupt",                # pre-2.1 spinner hint
    "ctrl-b to run in background",
    "ctrl+b to run in background",
    "running stop hooks",
    "· ↓ ",                            # token counter in the spinner line
    "· ↑ ",
]

# Resting input prompt with its hint line.
[[rule]]
priority = 50
state = "idle"
any_of = [
    "? for shortcuts",
    "shift+tab to cycle",
    "bypass permissions on",
    "plan mode on",
    "manual mode on",
    "accept edits on",
]
